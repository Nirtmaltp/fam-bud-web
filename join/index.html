<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Join FamBud</title>
<meta name="description" content="You have been invited to join a family budget on FamBud!">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:40px 32px;text-align:center;max-width:380px;width:90%}
.logo{width:72px;height:72px;margin:0 auto 16px;border-radius:16px}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
.sub{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:28px;line-height:1.5}
.id-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;font-family:'Courier New',monospace;font-size:11px;color:rgba(255,255,255,0.5);word-break:break-all;margin-bottom:24px}
.btn{display:block;width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px;text-align:center}
.btn-primary{background:linear-gradient(135deg,#6366F1,#A855F7);color:#fff}
.btn-secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff}
.footer{margin-top:20px;font-size:12px;color:rgba(255,255,255,0.3)}
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#status{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
    <img class="logo" src="/fambud-logo.png" alt="FamBud" />
    <h1>Join FamBud</h1>
    <p class="sub">You've been invited to join a family budget on FamBud!</p>
    <div id="spinner" class="spinner"></div>
    <p id="status">Opening FamBud app...</p>
    <div id="id-section" style="display:none">
        <div class="id-box" id="household-id"></div>
    </div>
    <div id="buttons" style="display:none">
        <a class="btn btn-primary" id="open-btn" href="#">Open in FamBud</a>
        <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.fambudget.app">
            Get FamBud on Play Store
        </a>
    </div>
    <p class="footer">FamBud &middot; Family Budget Tracker</p>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var id = params.get('id') || '';
var deepLink = id ? 'fambudget:///?joinId=' + encodeURIComponent(id) : 'fambudget:///';

if (id) {
    document.getElementById('household-id').textContent = 'Household ID: ' + id;
    document.getElementById('id-section').style.display = 'block';
}
document.getElementById('open-btn').href = deepLink;

// Try auto-open
try { window.location.href = deepLink; } catch(e) {}

// Fallback after 2.5s
setTimeout(function() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').textContent = 'Tap below to open the app or download it';
    document.getElementById('buttons').style.display = 'block';
}, 2500);
</script>
</body>
</html>
